<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOGDANEWS | ГАЗЕТА</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Roboto+Mono:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --main-bg: #f9f7f2; 
            --text-dark: #121212; 
            --accent-red: #bc0000; 
            --border-thin: 1px solid rgba(0,0,0,0.15);
            --border-thick: 3px solid var(--text-dark);
        }
        body { background-color: var(--main-bg); color: var(--text-dark); font-family: 'Roboto', sans-serif; margin: 0; padding: 0; }
        #custom-alert {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #000; color: #fff; padding: 15px 30px;
            font-family: 'Roboto Mono', monospace; z-index: 10000;
            border: 2px solid var(--accent-red); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #custom-alert.show { top: 20px; }
        header { border-bottom: 1px solid var(--text-dark); max-width: 1300px; margin: 0 auto; padding: 40px 20px; text-align: center; }
        .site-title { font-family: 'Playfair Display', serif; font-size: 5.5rem; margin: 0; text-transform: uppercase; letter-spacing: -3px; }
        .sub-header { border-top: 1px solid var(--text-dark); border-bottom: 4px double var(--text-dark); margin-top: 10px; padding: 10px 0; font-size: 0.85rem; text-transform: uppercase; font-family: 'Roboto Mono', monospace; display: flex; justify-content: space-between; }
        main { max-width: 1300px; margin: 40px auto; display: grid; grid-template-columns: 1fr 3fr 1fr; gap: 40px; padding: 0 20px; }
        .news-article { margin-bottom: 60px; padding-bottom: 40px; border-bottom: var(--border-thin); }
        .news-title { font-family: 'Playfair Display', serif; font-size: 3rem; margin: 10px 0; }
        .news-content { font-size: 1.1rem; line-height: 1.6; text-align: justify; }
        .reactions { margin-top: 25px; display: flex; gap: 10px; }
        .react-btn { background: none; border: 1px solid #000; padding: 8px 15px; cursor: pointer; font-family: 'Roboto Mono'; font-weight: bold; }
        .react-btn:hover { background: #000; color: #fff; }
        .react-btn:disabled { opacity: 0.5; cursor: not-allowed; background: #eee; }
        .auth-card { background: #fff; border: 1px solid #000; padding: 15px; box-shadow: 8px 8px 0px #000; }
        .auth-btn { width: 100%; padding: 12px; font-family: 'Roboto Mono'; font-weight: bold; border: 2px solid #000; cursor: pointer; margin-top: 10px; }
        .login-btn { background: #000; color: #fff; }
        .prop-input, .prop-area { width: 100%; border: 1px solid #000; padding: 8px; font-family: 'Roboto Mono'; margin-bottom: 10px; box-sizing: border-box; }
        @media (max-width: 1000px) { main { grid-template-columns: 1fr; } .site-title { font-size: 3.5rem; } }
    </style>
</head>
<body>
    <div id="custom-alert">СООБЩЕНИЕ</div>

    <header>
        <div class="site-title">BogdaNews</div>
        <div class="sub-header">
            <span id="live-date">ДАТА</span>
            <span>КРУТО</span>
            <span>ТОМ CXIII — № 42</span>
        </div>
    </header>
    
    <main>
        <aside>
            <div class="sidebar-title" style="font-weight: bold; background: #000; color: #fff; padding: 5px;">РЕДАКЦИЯ</div>
            <p style="font-style: italic; font-size: 0.8rem;">"ПРАВДА — ЭТО ТОЛЬКО ТО, ЧТО МЫ ПЕЧАТАЕМ."</p>
        </aside>

        <section id="news-container">
            <div style="text-align: center; font-family: 'Roboto Mono';">ЗАГРУЗКА ГАЗЕТЫ...</div>
        </section>
        
        <aside>
            <div class="auth-card">
                <div id="unauth-view">
                    <button class="auth-btn login-btn" id="btn-login">ВХОД ЧЕРЕЗ GOOGLE</button>
                </div>
                <div id="auth-view" style="display: none;">
                    <div id="user-email" style="font-family: 'Roboto Mono'; font-size: 0.8rem; margin-bottom: 10px;"></div>
                    <button class="auth-btn" id="btn-logout">ВЫХОД</button>
                </div>
            </div>

            <div style="margin-top: 30px;">
                <div style="font-weight: bold; background: #000; color: #fff; padding: 5px; margin-bottom: 10px;">ПРЕДЛОЖКА</div>
                <input type="text" id="prop-title" class="prop-input" placeholder="ЗАГОЛОВОК">
                <textarea id="prop-text" class="prop-area" placeholder="ТЕКСТ НОВОСТИ"></textarea>
                <button class="auth-btn login-btn" id="btn-send">ОТПРАВИТЬ</button>
            </div>
        </aside>
    </main>

    <script type="module">
        const S_URL = 'https://lqnluvjvghxoiqknfixp.supabase.co';
        const S_KEY = 'sb_publishable_ZKaIa2ygxMrvn6M8urGE1A_1M4PR3jQ';
        const sb = window.supabase.createClient(S_URL, S_KEY);

        let user = null;

        function alertMe(msg) {
            const el = document.getElementById('custom-alert');
            el.innerText = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 3000);
        }

        // 1. ЛОГИКА ВХОДА (ИСПРАВЛЕН РЕДИРЕКТ)
        async function login() {
            const { error } = await sb.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin + window.location.pathname
                }
            });
            if (error) alertMe("ОШИБКА ВХОДА");
        }

        // 2. ЛОГИКА РЕАКЦИЙ (ГЛОБАЛЬНО)
        window.handleReaction = async (id, type, current) => {
            if (!user) return alertMe("ВОЙДИТЕ ДЛЯ ГОЛОСОВАНИЯ");
            
            const storageKey = `vote_${id}_${type}`;
            if (localStorage.getItem(storageKey)) return alertMe("УЖЕ ПРОГОЛОСОВАНО");

            const { error } = await sb.from('news').update({ [type]: current + 1 }).eq('id', id);
            
            if (!error) {
                localStorage.setItem(storageKey, 'true');
                loadNews();
            } else {
                alertMe("ОШИБКА БАЗЫ");
            }
        };

        // 3. ЗАГРУЗКА НОВОСТЕЙ
        async function loadNews() {
            const { data, error } = await sb.from('news').select('*').order('id', { ascending: false });
            if (error) return;

            const container = document.getElementById('news-container');
            container.innerHTML = data.map(n => `
                <article class="news-article">
                    <div style="font-family: 'Roboto Mono'; font-size: 0.7rem; color: #666;">
                        ${new Date(n.created_at).toLocaleDateString()} | ГЛАЗ: ${n.views || 0}
                    </div>
                    <h2 class="news-title">${n.title}</h2>
                    <div class="news-content">${n.content}</div>
                    <div class="reactions">
                        <button class="react-btn" onclick="window.handleReaction(${n.id}, 'likes', ${n.likes || 0})">👍 ${n.likes || 0}</button>
                        <button class="react-btn" onclick="window.handleReaction(${n.id}, 'dislikes', ${n.dislikes || 0})">👎 ${n.dislikes || 0}</button>
                    </div>
                </article>
            `).join('');
        }

        // 4. ПРЕДЛОЖКА
        async function sendProp() {
            if (!user) return alertMe("НУЖЕН ВХОД");
            const title = document.getElementById('prop-title').value.trim();
            const content = document.getElementById('prop-text').value.trim();

            if (!title || !content) return alertMe("ЗАПОЛНИ ПОЛЯ");

            const { error } = await sb.from('suggestions').insert([{ title, content, author_email: user.email }]);
            if (!error) {
                alertMe("ОТПРАВЛЕНО В РЕДАКЦИЮ");
                document.getElementById('prop-title').value = '';
                document.getElementById('prop-text').value = '';
            }
        }

        // ИНИЦИАЛИЗАЦИЯ
        document.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('btn-login').onclick = login;
            document.getElementById('btn-logout').onclick = () => { sb.auth.signOut(); location.reload(); };
            document.getElementById('btn-send').onclick = sendProp;
            
            document.getElementById('live-date').innerText = new Date().toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long' }).toUpperCase();

            // Проверка юзера
            const { data } = await sb.auth.getUser();
            if (data.user) {
                user = data.user;
                document.getElementById('unauth-view').style.display = 'none';
                document.getElementById('auth-view').style.display = 'block';
                document.getElementById('user-email').innerText = user.email.toUpperCase();
            }
            loadNews();
        });
    </script>
</body>
</html>
